name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro type and .astro checks
        run: npm run check

      - name: Unit and contract tests (Vitest)
        run: npm run test:unit

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Build site
        run: npm run build

      - name: Set Playwright base-path values
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "PW_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "PW_BASE_URL=http://127.0.0.1:4321/" >> "$GITHUB_ENV"
          else
            echo "PW_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
            echo "PW_BASE_URL=http://127.0.0.1:4321/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: End-to-end tests (Playwright)
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_PATH: ${{ env.PW_BASE_PATH }}
          PLAYWRIGHT_BASE_URL: ${{ env.PW_BASE_URL }}
          PLAYWRIGHT_USE_PREVIEW: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore
